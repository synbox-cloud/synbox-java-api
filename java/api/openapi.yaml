      responses:
        "200":
          content:
            '*/*':
              schema:
                type: object
          description: OK
      tags:
      - api-key-controller
      x-content-type: application/json
      x-accepts:
      - '*/*'
  /api/external/curseforge/hytale/{serverId}/install/mod/{modId}:
    post:
      operationId: installMod
      parameters:
      - explode: false
        in: path
        name: serverId
        required: true
        schema:
          type: string
        style: simple
      - explode: false
        in: path
        name: modId
        required: true
        schema:
          format: int64
          type: integer
        style: simple
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: OK
      tags:
      - hytale-curse-forge-mod-controller
      x-accepts:
      - '*/*'
  /api/containers/{server_id}/settings/changeVersion:
    post:
      description: Changes the version of a specific server.
      operationId: changeVersion
      parameters:
      - description: ID of the server
        explode: false
        in: path
        name: server_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: object
          description: Successfully changed server version
        "403":
          content:
            '*/*':
              schema:
                type: object
          description: Forbidden
      summary: Change server version
      tags:
      - Version Management
      x-content-type: application/json
      x-accepts:
      - '*/*'
  /api/containers/{server_id}/settings/changeName:
    post:
      description: Changes the name of a specific server.
