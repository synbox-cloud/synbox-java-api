        "200":
          content:
            '*/*':
              schema:
                type: string
          description: Successfully updated user permissions
        "404":
          content:
            '*/*':
              schema:
                type: string
          description: Server not found
        "403":
          content:
            '*/*':
              schema:
                type: string
          description: Forbidden
      summary: Update user permissions
      tags:
      - User Share Management
      x-content-type: application/json
      x-accepts:
      - '*/*'
