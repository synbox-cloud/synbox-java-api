  /api/containers/{server_id}/permission/share/user:
    get:
      description: Retrieves a list of users and their permissions for a specific
        server.
      operationId: getUsers_1
      parameters:
      - description: ID of the server
        explode: false
        in: path
        name: server_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "404":
          content:
            '*/*':
              schema:
                type: string
          description: Server not found
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: Successfully retrieved users and permissions
