  /webhook/mollie:
    post:
      operationId: receive
      parameters:
      - explode: true
        in: query
        name: id
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          description: OK
      tags:
      - mollie-webhook-controller
      x-accepts:
      - application/json
  /webhook/cloudserver:
    post:
      operationId: receive_1
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "200":
          description: OK
      tags:
      - cloud-server-status-webhook-controller
      x-content-type: application/json
      x-accepts:
      - application/json
  /api/user/apikey:
    get:
      operationId: list
      responses:
        "200":
          content:
            '*/*':
              schema:
                type: object
          description: OK
      tags:
      - api-key-controller
      x-accepts:
      - '*/*'
    post:
      operationId: create
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReq"
