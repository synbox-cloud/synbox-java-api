components:
  schemas:
    StartStopTimeDTO:
      description: DTO für Start- und Stopp-Zeit eines Vorgangs
      example:
        stop: 2025-07-18T12:30:00Z
        success: true
        errorMessage: errorMessage
        start: 2025-07-18T12:00:00Z
        day: MONDAY
        enabled: true
      properties:
        success:
          description: "Gibt an, ob die Anfrage erfolgreich war"
          example: true
          type: boolean
        errorMessage:
          description: "Fehlermeldung, falls ein Fehler aufgetreten ist"
          type: string
        start:
          description: Startzeit im ISO-Format
          example: 2025-07-18T12:00:00Z
          type: string
        stop:
          description: Stoppzeit im ISO-Format
          example: 2025-07-18T12:30:00Z
          type: string
        enabled:
          default: true
          description: Aktiviert oder Deaktiviert den Zeitplan
          example: true
          type: boolean
        day:
          description: Wochentag für den der Zeitplan gilt
          example: MONDAY
          type: string
      type: object
    ScheduleModel:
      example:
        dayModel: MONDAY
        data: data
        lastRun: 0
        action: START
        id: id
        time: time
      properties:
        id:
          type: string
        dayModel:
          enum:
          - MONDAY
          - TUESDAY
          - WEDNESDAY
          - THURSDAY
          - FRIDAY
          - SATURDAY
          - SUNDAY
          - EVERY_DAY
          type: string
        action:
          enum:
          - START
          - STOP
          - RESTART
          - BACKUP
          type: string
        time:
          type: string
        data:
          type: string
        lastRun:
          format: int64
          type: integer
      type: object
    CreateReq:
      example:
        name: name
      properties:
        name:
          type: string
      type: object
    FileBodyModel:
      example:
        name: name
        content: content
      properties:
        name:
          type: string
        content:
          type: string
      type: object
    RemoteFiles:
      example:
        root: root
        files:
        - files
        - files
      properties:
        root:
          type: string
        files:
          items:
