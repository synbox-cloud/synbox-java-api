openapi: 3.0.1
info:
  title: Synbox-API
  version: v1
servers:
- description: Generated server url
  url: http://synbox.cloud
security:
- ApiKeyAuth: []
tags:
- description: Endpoints for managing container start and stop times
  name: Start/Stop Management
- description: Endpoints for managing container power state
  name: Container Power Management
- description: Endpoints for managing user permissions on a server
  name: User Share Management
- description: API zum Verwalten von Container-Backups
  name: Backup-Management
- description: Endpoints for managing game servers
  name: Server Management
- description: Manage container volumes
  name: Container Volumes
- description: Endpoints for console authentication
  name: Console Auth
- description: Endpoints for managing server name
  name: Name Management
- description: Endpoints for managing server version
  name: Version Management
- description: Endpoints for managing SFTP access
  name: SFTP Management
- description: Endpoints for managing container files
  name: File Management
- description: Endpoints for managing server schedules
  name: Schedule Management
paths:
  /api/server/containers/{id}/startstop:
    get:
      description: Retrieves the start and stop times for a specific container.
      operationId: getStart
      parameters:
      - description: ID of the container
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StartStopTimeDTO"
          description: Bad request
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StartStopTimeDTO"
          description: Successfully retrieved start and stop times
        "403":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StartStopTimeDTO"
          description: Forbidden
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StartStopTimeDTO"
          description: Container not found
      summary: Get start and stop times
      tags:
      - Start/Stop Management
      x-accepts:
      - '*/*'
    put:
      description: Updates the start and stop times for a specific container.
      operationId: putStart
      parameters:
      - description: ID of the container
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "400":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StartStopTimeDTO"
          description: Bad request
        "403":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StartStopTimeDTO"
          description: Forbidden
        "404":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StartStopTimeDTO"
          description: Container not found
        "200":
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/StartStopTimeDTO"
          description: Successfully updated start and stop times
      summary: Update start and stop times
      tags:
      - Start/Stop Management
      x-content-type: application/json
      x-accepts:
      - '*/*'
  /api/containers/{server_id}/schedules/update:
    put:
      description: Updates an existing schedule for a specific server.
      operationId: updateSchedules
      parameters:
      - description: ID of the server
        explode: false
        in: path
        name: server_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleModel"
        required: true
      responses:
        "403":
          content:
            '*/*':
              schema:
                type: string
          description: Forbidden
        "200":
          content:
            '*/*':
              schema:
                type: string
          description: Successfully updated schedule
      summary: Update a schedule
      tags:
      - Schedule Management
      x-content-type: application/json
      x-accepts:
      - '*/*'
